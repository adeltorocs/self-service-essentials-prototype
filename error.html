<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error – edX Enterprise</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="logo">
        <img src="svg/edx-enterprise-logo-white.svg" alt="edX Enterprise" />
      </a>
    </div>
  </header>

  <!-- ERROR PAGE -->
  <main class="error-page">
    <div class="error-icon-wrap">
      <!-- Document/error icon -->
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <div class="error-badge"></div>
    </div>

    <h1 class="error-title">We're sorry. Something went wrong.</h1>
    <p class="error-code">Error 404: System failure</p>
    <p class="error-desc">Please try again. If the problem persists, please contact your systems administrator.</p>

    <a href="index-new-user.html" class="btn btn-brand btn-lg">
      Return to edX Enterprise Plans
    </a>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-logo">
        <img src="svg/edx-enterprise-logo-black.svg" alt="edX Enterprise" />
      </div>
      <ul class="footer-links">
        <li><a href="#">Terms of Service</a></li>
        <li><a href="#">Privacy Policy</a></li>
        <li><a href="#">Support</a></li>
      </ul>
    </div>
  </footer>

</body>
</html>
